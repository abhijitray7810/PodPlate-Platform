# ── Product Service ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: podplate
  labels:
    app: product-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: abhijitray/podplate-product-service:latest
          ports:
            - containerPort: 3003
          env:
            - name: SERVICE_NAME
              value: "product-service"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: podplate-config
                  key: NODE_ENV
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: podplate-config
                  key: FRONTEND_URL
            - name: MONGODB_URI
              value: "mongodb://admin:$(MONGO_PASSWORD)@mongodb-service:27017/podplate_products?authSource=admin"
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: podplate-secrets
                  key: MONGO_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: podplate-secrets
                  key: JWT_SECRET
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
      volumes:
        - name: uploads
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: podplate
spec:
  selector:
    app: product-service
  ports:
    - port: 3003
      targetPort: 3003
  type: ClusterIP
---

