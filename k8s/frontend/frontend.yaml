apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: podplate
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: abhijitray/podplate-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: SERVICE_NAME
              value: "frontend"
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: podplate-config
                  key: NEXT_PUBLIC_API_URL
            - name: NEXT_PUBLIC_API_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: podplate-config
                  key: NEXT_PUBLIC_API_GATEWAY_URL
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: podplate
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
