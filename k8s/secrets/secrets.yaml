# ─────────────────────────────────────────────────────────
# IMPORTANT: Replace all base64 values before applying.
# Generate with: echo -n "your_value" | base64
#
# Examples used below (CHANGE THESE):
#   jwt_secret_here        → echo -n "your_jwt_secret" | base64
#   jwt_refresh_here       → echo -n "your_refresh_secret" | base64
#   adminpassword          → echo -n "your_mongo_password" | base64
#   podplate_redis_pass    → echo -n "your_redis_password" | base64
# ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: podplate-secrets
  namespace: podplate
type: Opaque
data:
  JWT_SECRET:           eW91cl9qd3Rfc2VjcmV0X2hlcmU=       # your_jwt_secret_here
  JWT_REFRESH_SECRET:   eW91cl9yZWZyZXNoX3NlY3JldA==       # your_refresh_secret
  MONGO_PASSWORD:       YWRtaW5wYXNzd29yZA==               # adminpassword
  REDIS_PASSWORD:       cG9kcGxhdGVfcmVkaXNfcGFzcw==       # podplate_redis_pass
  MONGO_ROOT_USERNAME:  YWRtaW4=                           # admin
