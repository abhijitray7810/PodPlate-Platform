# ─────────────────────────────────────────────────────────
# Ingress — exposes frontend and API Gateway externally
# Requires: nginx ingress controller
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml
#
# For local Minikube:
#   minikube addons enable ingress
#
# Update host values to match your domain or use nip.io:
#   podplate.YOUR_IP.nip.io
# ─────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: podplate-ingress
  namespace: podplate
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    # Frontend
    - host: podplate.local        # change to your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000

    # API Gateway
    - host: api.podplate.local    # change to your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 3000
